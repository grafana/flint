[fake_bins]
mise = '''
#!/bin/sh
# Fake mise: handles `mise use --pin <key>@latest` by appending to mise.toml.
# Real mise also installs the tool; the fake skips that since the test only
# cares about the file mutation. Requires `--pin` so regressions that forget
# the flag (and would write soft `latest` pins in real use) fail the test.
cmd=$1
shift
[ "$cmd" = "use" ] || exit 0
key=""
saw_pin=0
while [ $# -gt 0 ]; do
    case "$1" in
        --pin) saw_pin=1 ;;
        *@*) key="${1%@*}" ;;
    esac
    shift
done
if [ "$saw_pin" -ne 1 ]; then
    echo "fake mise: refusing \`mise use\` without --pin (got: $*)" >&2
    exit 1
fi
[ -n "$key" ] || exit 0
: "${MISE_PROJECT_ROOT:=.}"
mise_toml="$MISE_PROJECT_ROOT/mise.toml"
[ -f "$mise_toml" ] || printf '[tools]\n' > "$mise_toml"
case "$key" in
    *:*|*/*) qkey="\"$key\"" ;;
    *) qkey="$key" ;;
esac
if ! grep -Fq "$qkey =" "$mise_toml" 2>/dev/null; then
    printf '%s = "1.0.0"\n' "$qkey" >> "$mise_toml"
fi
'''
