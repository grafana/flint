[env]
FLINT_CONFIG_DIR = ".github/config"

[tools]
dotnet = "10.0.201"
go = "1.26.2"
node = "24.15.0"
release-plz = "0.3.157"
rust = { version = "1.95.0", components = "clippy,rustfmt" }

# Linters
actionlint = "1.7.10"
"aqua:owenlamont/ryl" = "0.6.0"
biome = "2.4.12"
editorconfig-checker = "v3.6.1"
"github:google/google-java-format" = "1.35.0"
"github:jonwiggins/xmloxide" = "v0.4.2"
"github:koalaman/shellcheck" = "0.11.0"
golangci-lint = "2.11.4"
hadolint = "2.14.0"
ktlint = "1.8.0"
lychee = "0.22.0"
"npm:renovate" = "43.141.6"
"pipx:codespell" = "2.4.2"
ruff = "0.15.12"
rumdl = "0.1.78"
shfmt = "v3.13.1"
taplo = "0.10.0"

[tasks."setup:update-super-linter-versions"]
description = "Generate super-linter version mapping from the super-linter repo"
file = "tasks/setup/update-super-linter-versions.sh"

[tasks.lint]
description = "Run all lints"
run = "cargo run -q --bin flint -- run"

[tasks."lint:fix"]
description = "Auto-fix lint issues"
run = "cargo run -q --bin flint -- run --fix"

[tasks."release:pr"]
description = "Open or update the release PR"
depends = ["release:update"]
run = "release-plz release-pr --allow-dirty"

[tasks.build]
description = "Build the project"
run = "cargo build"

[tasks.test]
description = "Run tests"
run = "cargo test -q"
