---
name: Test

on:
  push:
    branches: [main]
  pull_request:

permissions: {}

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            mise_version: v2026.7.0
            mise_sha256: 0744cb3c303baf0d308ff7b112ed41f22abb6029cb5644fd3a8ce74b29f16a68
          - os: macos-15
            mise_version: v2026.7.0
            mise_sha256: cc5a708f75e9a84e007a650c23b127e79e54aacf0e41378d75bb15795e9ed54d
          - os: windows-2025
            mise_version: v2026.7.0
            mise_sha256: 7fddd61617c88945cc754a6dfcc44b92767973a8ffab221229c4f9cb6ec888e7

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
        with:
          persist-credentials: false
          fetch-depth: 0  # needed for merge-base in e2e tests

      # Defender real-time scan dominates mise cache extract on Windows
      # (tar -xf of ~570MB many-small-files takes ~80s). Exclude before restore.
      - name: Exclude mise dir from Defender (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        continue-on-error: true
        run: |
          try {
            Add-MpPreference -ExclusionPath "$env:LOCALAPPDATA\mise" -ErrorAction Stop
          } catch {
            Write-Warning "Could not add Defender exclusion for mise directory; continuing without it. $($_.Exception.Message)"
          }

      - name: Setup mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d  # v4.2.0
        with:
          version: ${{ matrix.mise_version }}
          sha256: ${{ matrix.mise_sha256 }}
          cache_key_prefix: mise-v2

      - name: Install mise tools
        run: mise install

      - name: Install Rust lint components
        run: rustup component add clippy rustfmt

      - name: Restore cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1

      - name: Test
        run: mise run test

      - name: Live Renovate regression
        if: runner.os == 'Linux'
        env:
          FLINT_LIVE_RENOVATE_TESTS: "1"
          GITHUB_TOKEN: ${{ github.token }}
        run: mise exec -- cargo test -q renovate_deps_live_accepts_normalized_current_version -- --nocapture
