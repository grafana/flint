[expected]
args = "run --full --fix renovate-deps"
exit = 1
stderr = '''
flint: fixed: renovate-deps — commit before pushing
'''

[env]
GITHUB_TOKEN = "token"

[expected.files]
".reno-mode" = "lookup\n"
"renovate-tracked-deps.json" = """
{
  "meta": {
    "actionlint": {
      "packageName": "rhysd/actionlint",
      "datasource": "github-releases"
    }
  },
  "files": {
    "mise.toml": {
      "mise": [
        "actionlint"
      ]
    }
  }
}
"""

[fake_bins]
renovate = '''
#!/bin/sh
set -eu

mode=""
for arg in "$@"; do
  case "$arg" in
    --dry-run=*) mode="${arg#--dry-run=}" ;;
  esac
done
printf '%s\n' "$mode" > .reno-mode
if [ "$mode" = "lookup" ]; then
  printf '%s\n' '{"msg":"packageFiles with updates","config":{"mise":[{"packageFile":"mise.toml","deps":[{"depName":"actionlint","packageName":"rhysd/actionlint","datasource":"github-releases"}]}]}}'
else
  printf '%s\n' '{"msg":"Extracted dependencies","packageFiles":{"mise":[{"packageFile":"mise.toml","deps":[{"depName":"actionlint"}]}]}}'
fi
'''
