[expected]
args = "run --full --fix rumdl"
exit = 1
stderr = '''
flint: fixed: rumdl — commit before pushing
'''

[expected.files]
"README.md" = """
# Title

Text with trailing spaces

## Section
"""

[fake_bins]
rumdl = '''
#!/bin/sh
set -eu
file=""
fix=0
for arg in "$@"; do
  case "$arg" in
    --fix) fix=1 ;;
    -*) ;;
    *) file="$arg" ;;
  esac
done
[ -n "$file" ] || exit 1
if grep -q 'spaces   $' "$file"; then
  if [ "$fix" -eq 1 ]; then
    cat >"$file" <<'EOF'
# Title

Text with trailing spaces

## Section
EOF
    exit 0
  fi
  printf '%s\n' 'README.md:3:26: trailing spaces'
  exit 1
fi
exit 0
'''
