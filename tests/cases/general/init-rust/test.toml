[expected.files]
".editorconfig" = '''
root = true

[*]
end_of_line = lf
insert_final_newline = true
charset = utf-8
indent_style = space
indent_size = 2
max_line_length = 120

[*.rs]
# Rust line length is handled by rustfmt
