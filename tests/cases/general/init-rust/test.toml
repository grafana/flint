  wrote <REPO>/biome.jsonc
  wrote <REPO>/.github/config/rustfmt.toml
  removed <REPO>/.markdownlint.json (replaced by .rumdl.toml)
  wrote <REPO>/.github/config/.rumdl.toml
  wrote <REPO>/.github/config/.yamllint.yml
  patched <REPO>/.editorconfig — set max_line_length = 120
  patched <REPO>/.editorconfig — disable max_line_length for [*.rs], [*.md]
installed pre-commit hook (.git/hooks/pre-commit)
