# Lychee configuration file
# See https://lychee.cli.rs/config/

timeout = 30
# Keep retries low to avoid compounding 429 rate limiting —
# aggressive retries generate more requests, triggering more 429s.
retry_wait_time = 10
max_retries = 2
max_concurrency = 4

# Check link anchors
include_fragments = true

remap = [
  # GitHub blob URL fragment workaround (lychee#1729) is handled by
  # the lint:links script — no global remap needed here
]

exclude = [
  # Google Docs links are often rate-limited and not critical to validate in this repository,
  # so we exclude them to avoid false positives and improve performance
  "https://docs.google.com/.*",
  # Release Please generates compare links for future releases that 404 until the release is published
  "https://github.com/.*/compare/.*"
]
