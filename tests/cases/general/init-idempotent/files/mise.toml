[tools]
rust = { version = "1.0.0", components = "clippy,rustfmt" }

# Linters
actionlint = "1.0.0"
"aqua:owenlamont/ryl" = "1.0.0"
biome = "1.0.0"
editorconfig-checker = "1.0.0"
"github:grafana/flint" = "1.0.0"
lychee = "1.0.0"
"pipx:codespell" = "1.0.0"
rumdl = "1.0.0"
taplo = "1.0.0"

[env]
FLINT_CONFIG_DIR = ".github/config"

[tasks.lint]
description = "Run all lints"
run = "flint run"

[tasks."lint:fix"]
description = "Auto-fix lint issues"
run = "flint run --fix"
