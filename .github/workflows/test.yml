---
name: Test

on:
  push:
    branches: [main]
  pull_request:

permissions: {}

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            mise_version: v2026.7.7
            mise_sha256: 429f71e7e989908bf975aafac9066329c16e2d8fc7cd8e74fdf21dd6300ffe7c
          - os: macos-15
            mise_version: v2026.7.7
            mise_sha256: 5b890cccc75fc43a494b83ace21dbd2ee26120ff19ba1994cdcd054b3a15abbd
          - os: windows-2025
            mise_version: v2026.7.7
            mise_sha256: 918214d1fbfa1ac9845484a54784e32df49aeb86157a010dc36a532943d73e1e

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7
        with:
          persist-credentials: false
          fetch-depth: 0  # needed for merge-base in e2e tests

      # Defender real-time scan dominates mise cache extract on Windows
      # (tar -xf of ~570MB many-small-files takes ~80s). Exclude before restore.
      - name: Exclude mise dir from Defender (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        continue-on-error: true
        run: |
          try {
            Add-MpPreference -ExclusionPath "$env:LOCALAPPDATA\mise" -ErrorAction Stop
          } catch {
            Write-Warning "Could not add Defender exclusion for mise directory; continuing without it. $($_.Exception.Message)"
          }

      - name: Setup mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea  # v4.2.1
        with:
          version: ${{ matrix.mise_version }}
          sha256: ${{ matrix.mise_sha256 }}
          cache_key_prefix: mise-v2

      - name: Install mise tools
        run: mise install

      - name: Install Rust lint components
        run: rustup component add clippy rustfmt

      - name: Restore cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1

      - name: Test
        run: mise run test

      - name: Live Renovate regression
        if: runner.os == 'Linux'
        env:
          FLINT_LIVE_RENOVATE_TESTS: "1"
          GITHUB_TOKEN: ${{ github.token }}
        run: mise exec -- cargo test -q renovate_deps_live_accepts_normalized_current_version -- --nocapture
