---
name: Test

on:
  push:
    branches: [main]
  pull_request:

permissions: {}

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            mise_version: v2026.4.15
            mise_sha256: c55befc52e5694f388b927ef304362ca7b9e919d97d43c342fca57f2eccea255
          - os: macos-15
            mise_version: v2026.4.15
            mise_sha256: 165916aab9cd842bda00fba58b7f0eb59b051312e5dab7eee7166fed429006ea
          - os: windows-2025
            mise_version: v2026.4.15
            mise_sha256: ba6367da9431540f714370df91d6afd9ac7aa837af60f975492f876e5f981d50

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0 # needed for merge-base in e2e tests

      - name: Setup mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          version: ${{ matrix.mise_version }}
          sha256: ${{ matrix.mise_sha256 }}
          cache_key_prefix: mise-v2

      - name: Install Rust lint components
        run: rustup component add clippy rustfmt

      - name: Restore cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Test
        run: cargo test
