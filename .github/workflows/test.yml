---
name: Test

on:
  push:
    branches: [main]
  pull_request:

permissions: {}

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            mise_version: v2026.6.3
            mise_sha256: f387ae0899850bf16cff0969c14fa6e57b51177501082061b01933274a7fc5be
          - os: macos-15
            mise_version: v2026.6.3
            mise_sha256: 737353e07a404ff7d0be079fcc9325fb5b68840293a5165c714c26deabee9a9d
          - os: windows-2025
            mise_version: v2026.6.3
            mise_sha256: 21456ffcd3dc3cf2229f48aa17f22dcc770983644d72ca51d22a559b98b5723a

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 0  # needed for merge-base in e2e tests

      # Defender real-time scan dominates mise cache extract on Windows
      # (tar -xf of ~570MB many-small-files takes ~80s). Exclude before restore.
      - name: Exclude mise dir from Defender (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        continue-on-error: true
        run: |
          try {
            Add-MpPreference -ExclusionPath "$env:LOCALAPPDATA\mise" -ErrorAction Stop
          } catch {
            Write-Warning "Could not add Defender exclusion for mise directory; continuing without it. $($_.Exception.Message)"
          }

      - name: Setup mise
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925  # v4.1.0
        with:
          version: ${{ matrix.mise_version }}
          sha256: ${{ matrix.mise_sha256 }}
          cache_key_prefix: mise-v2

      - name: Install mise tools
        run: mise install

      - name: Install Rust lint components
        run: rustup component add clippy rustfmt

      - name: Restore cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1

      - name: Test
        run: mise run test

      - name: Live Renovate regression
        if: runner.os == 'Linux'
        env:
          FLINT_LIVE_RENOVATE_TESTS: "1"
          GITHUB_TOKEN: ${{ github.token }}
        run: mise exec -- cargo test -q renovate_deps_live_accepts_normalized_current_version -- --nocapture
