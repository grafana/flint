[env]
FLINT_CONFIG_DIR = ".github/config"

[tools]
dotnet = "10.0.201"
go = "1.26.5"
node = "24.18.0"
release-plz = "0.3.157"
rust = { version = "1.97.1", components = "clippy,rustfmt" }

# Linters
actionlint = "1.7.12"
"aqua:jonwiggins/xmloxide" = "0.4.3"
"aqua:owenlamont/ryl" = "0.21.0"
biome = "2.5.4"
editorconfig-checker = "3.8.0"
golangci-lint = "2.12.2"
google-java-format = "1.35.0"
hadolint = "2.14.0"
ktlint = "1.8.0"
kube-linter = "0.8.3"
lychee = "0.24.2"
"npm:renovate" = "43.265.4"
ruff = "0.15.22"
rumdl = "0.2.34"
shellcheck = "0.11.0"
shfmt = "3.13.1"
taplo = "0.10.0"
typos = "1.48.0"
zizmor = "1.27.0"

[tasks.lint]
description = "Run all lints"
run = "cargo run -q --bin flint -- run"

[tasks."lint:fix"]
description = "Auto-fix lint issues"
run = "cargo run -q --bin flint -- run --fix"

[tasks.build]
description = "Build the project"
run = "cargo build"

[tasks.test]
description = "Run tests"
run = "cargo test -q"

[tasks.generate]
description = "Regenerate README + docs/ tables from the registry and CLI"
run = "UPDATE_README=1 cargo test -q -- readme_linter_table_in_sync cli_docs_in_sync"

[tasks."generate:snapshots"]
description = "Regenerate golden stdout/stderr/exit in tests/cases/*/test.toml"
run = "UPDATE_SNAPSHOTS=1 cargo test -q cases"
