[env]
FLINT_CONFIG_DIR = ".github/config"

[tools]
aube = "latest"
dotnet = "10.0.201"
go = "1.26.4"
node = "24.16.0"
release-plz = "0.3.157"
rust = { version = "1.96.0", components = "clippy,rustfmt" }

# Linters
actionlint = "1.7.10"
"aqua:jonwiggins/xmloxide" = "v0.4.2"
"aqua:owenlamont/ryl" = "0.8.0"
biome = "2.4.12"
editorconfig-checker = "v3.6.1"
golangci-lint = "2.12.1"
google-java-format = "1.35.0"
hadolint = "2.14.0"
ktlint = "1.8.0"
lychee = "0.24.2"
"npm:renovate" = { version = "43.150.0", allow_builds = ["re2"] }
ruff = "0.15.12"
rumdl = "0.1.78"
shellcheck = "0.11.0"
shfmt = "v3.13.1"
taplo = "0.10.0"
typos = "1.46.0"
zizmor = "1.25.2"

[tasks.lint]
description = "Run all lints"
run = "cargo run -q --bin flint -- run"

[tasks."lint:fix"]
description = "Auto-fix lint issues"
run = "cargo run -q --bin flint -- run --fix"

[tasks.build]
description = "Build the project"
run = "cargo build"

[tasks.test]
description = "Run tests"
run = "cargo test -q"

[tasks.generate]
description = "Regenerate README + docs/ tables from the registry and CLI"
run = "UPDATE_README=1 cargo test -q -- readme_linter_table_in_sync cli_docs_in_sync"

[tasks."generate:snapshots"]
description = "Regenerate golden stdout/stderr/exit in tests/cases/*/test.toml"
run = "UPDATE_SNAPSHOTS=1 cargo test -q cases"
