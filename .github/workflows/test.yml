---
name: Test

on:
  push:
    branches: [main]
  pull_request:

permissions: {}

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            mise_version: v2026.4.19
            mise_sha256: 6b58ff5f1e1ce98ed2b7e5372c344ea48182c460e5b6df12d9e0def35aad4438
          - os: macos-15
            mise_version: v2026.4.19
            mise_sha256: 87ce4f73f9e0cc0f5b040903cfa771a8cc46a6e554d0bfdbbea373000144b762
          - os: windows-2025
            mise_version: v2026.4.19
            mise_sha256: 2666a300762a1eafa5280d0d55348172ae9985d3c700cbdb6a5888878b66407d

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0  # needed for merge-base in e2e tests

      # Defender real-time scan dominates mise cache extract on Windows
      # (tar -xf of ~570MB many-small-files takes ~80s). Exclude before restore.
      - name: Exclude mise dir from Defender (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        continue-on-error: true
        run: |
          try {
            Add-MpPreference -ExclusionPath "$env:LOCALAPPDATA\mise" -ErrorAction Stop
          } catch {
            Write-Warning "Could not add Defender exclusion for mise directory; continuing without it. $($_.Exception.Message)"
          }

      - name: Setup mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151  # v4.0.1
        with:
          version: ${{ matrix.mise_version }}
          sha256: ${{ matrix.mise_sha256 }}
          cache_key_prefix: mise-v2

      - name: Install mise tools
        run: mise install

      - name: Install Rust lint components
        run: rustup component add clippy rustfmt

      - name: Restore cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1

      - name: Test
        run: mise run test
