[expected]
args = "run --full --fix renovate-deps"
exit = 1
stderr = '''
flint: fixed: renovate-deps — commit before pushing
'''

[env]
GITHUB_TOKEN = "token"

[expected.files]
".reno-count" = "3\n"
"renovate.json5" = '''
{
  "packageRules": [
    {
      "description": "Flint autofix: align extractVersion for biome",
      "extractVersion": "^@biomejs/biome@(?<version>.+)$",
      "matchDepNames": [
        "biome"
      ]
    }
  ]
}
'''
"renovate-tracked-deps.json" = '''
{
  "meta": {
    "biome": {
      "packageName": "biomejs/biome",
      "datasource": "github-tags"
    }
  },
  "files": {
    "mise.toml": {
      "mise": [
        "biome"
      ]
    }
  }
}
'''

[fake_bins]
renovate = '''
#!/bin/sh
set -eu

count=0
if [ -f .reno-count ]; then
  count=$(cat .reno-count)
fi
count=$((count + 1))
printf '%s\n' "$count" > .reno-count

if grep -F '"extractVersion": "^@biomejs/biome@(?<version>.+)$"' "$RENOVATE_CONFIG_FILE" >/dev/null 2>&1; then
  printf '%s\n' '{"msg":"packageFiles with updates","config":{"mise":[{"packageFile":"mise.toml","deps":[{"depName":"biome","packageName":"biomejs/biome","datasource":"github-tags","currentValue":"2.4.12","currentVersion":"@biomejs/biome@2.4.12","extractVersion":"^@biomejs/biome@(?<version>.+)$"}]}]}}'
else
  printf '%s\n' '{"msg":"packageFiles with updates","config":{"mise":[{"packageFile":"mise.toml","deps":[{"depName":"biome","packageName":"biomejs/biome","datasource":"github-tags","currentValue":"2.4.12","currentVersion":"@biomejs/biome@2.4.12","extractVersion":"^v?(?<version>.+)"}]}]}}'
fi
'''
