[env]
FLINT_CONFIG_DIR = ".github/config"

[tools]
lychee = "0.22.0"
node = "24.14.1"
"npm:renovate" = "43.92.1"
shellcheck = "v0.11.0"
shfmt = "v3.12.0"
actionlint = "1.7.10"
editorconfig-checker = "v3.6.1"
"npm:markdownlint-cli" = "0.47.0"
"npm:prettier" = "3.8.1"
"npm:@biomejs/biome" = "2.3.14"
"pipx:ruff" = "0.15.0"
"pipx:codespell" = "2.4.1"

[tasks."setup:update-super-linter-versions"]
description = "Generate super-linter version mapping from the super-linter repo"
file = "tasks/setup/update-super-linter-versions.sh"

[tasks.lint]
description = "Run all lints"
run = "cargo build -q && ./target/debug/flint"

[tasks.fix]
description = "Auto-fix lint issues"
run = "cargo build -q && ./target/debug/flint --fix"

[tasks.native-lint]
description = "Run lints natively (fast, no renovate)"
run = "cargo build -q && ./target/debug/flint --auto --fast"

# Rust tasks
[tasks.build]
description = "Build the project"
run = "cargo build"

[tasks."lint:rust"]
description = "Lint Rust code (clippy)"
run = "cargo clippy -q -- -D warnings"

[tasks.fmt]
description = "Format Rust code"
run = "cargo fmt"

[tasks."check-fmt"]
description = "Check Rust formatting"
run = "cargo fmt -- --check"

[tasks.test]
description = "Run tests"
run = "cargo test -q"
